<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilih Foto — Jonas Photo</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .select-wrap {
      width:100%;
      min-height:100vh;
      min-height:100dvh;
      height:100dvh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .select-main {
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:minmax(0, 1fr) minmax(300px, 24vw);
      overflow:hidden;
    }

    /* ─── Left: Photo Grid ────────────────────────────────────────────────── */
    .photo-grid-panel {
      display:flex;
      flex-direction:column;
      overflow:hidden;
      min-height:0;
      border-right:1px solid var(--border);
    }
    .photo-grid-header {
      padding:24px 32px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    .photo-grid-header-left p { font-size:11px; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
    .photo-grid-header-left h2 { font-family:var(--font-display); font-size:26px; font-weight:400; color:var(--cream); letter-spacing:-0.01em; }
    .photo-grid-header-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
    .slot-counter { font-family:var(--font-display); font-size:36px; font-weight:300; color:var(--gold); line-height:1; }
    .slot-counter-label { font-size:11px; color:var(--text-muted); letter-spacing:0.06em; }
    .slot-indicators { display:flex; gap:6px; margin-top:4px; }
    .slot-dot { width:24px; height:4px; border-radius:2px; background:var(--border-light); transition:var(--transition); }
    .slot-dot.filled { background:var(--gold); }

    .photo-grid-scroll {
      flex:1;
      min-height:0;
      overflow-y:auto;
      padding:20px 32px;
    }
    .photo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }

    .photo-item {
      position:relative; aspect-ratio:4/3; border-radius:var(--radius-md);
      overflow:hidden; cursor:pointer; border:2px solid transparent;
      transition:var(--transition); background:var(--bg-elevated);
    }
    .photo-item:hover { border-color:var(--border-light); transform:scale(1.02); }
    .photo-item.selected { border-color:var(--gold); box-shadow:0 0 0 1px var(--gold); }
    .photo-item.disabled { opacity:0.4; cursor:not-allowed; transform:none !important; }
    .photo-item img { width:100%; height:100%; object-fit:cover; display:block; }

    .photo-position-badge {
      position:absolute; top:6px; left:6px;
      background:var(--gold); color:var(--on-accent); font-size:12px; font-weight:700;
      display:none; align-items:center; justify-content:center; z-index:5;
      box-shadow:0 2px 8px #00000040;
    }
    .photo-item.selected .photo-position-badge { display:flex; }

    .photo-remove-btn {
      position:absolute; top:8px; right:8px;
      width:24px; height:24px; border-radius:50%;
      background:#00000088; border:none; color:#fff;
      font-size:14px; line-height:1; cursor:pointer;
      display:none; align-items:center; justify-content:center;
      z-index:5; transition:var(--transition);
    }
    .photo-remove-btn:hover { background:var(--blush); }
    .photo-item.selected .photo-remove-btn { display:flex; }

    .photo-overlay { position:absolute; inset:0; background:#01395e15; opacity:0; transition:var(--transition); }
    .photo-item.selected .photo-overlay { opacity:1; }

    .photo-empty { grid-column:1/-1; padding:60px 20px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:12px; }
    .photo-empty svg { opacity:0.2; }
    .photo-empty p { font-size:14px; color:var(--text-muted); }
    .photo-loading { grid-column:1/-1; display:flex; align-items:center; justify-content:center; gap:12px; padding:60px; color:var(--text-muted); font-size:13px; }

    /* ─── Right: Strip Preview dengan frame PNG asli ─────────────────────── */
    .strip-panel {
      display:flex;
      flex-direction:column;
      overflow-y:auto;
      min-height:0;
      background:var(--bg-card);
    }
    .strip-panel-header {
      padding:20px;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .strip-panel-header p { font-size:11px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); margin-bottom:4px; }
    .strip-panel-header h3 { font-family:var(--font-display); font-size:20px; font-weight:400; color:var(--cream); }

    .strip-preview-area {
      flex:1;
      min-height:220px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      overflow:visible;
      position:relative;
    }
    .strip-preview-area::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(circle at center,#01395e06 0%,transparent 70%); pointer-events:none;
    }

    /* Container strip dengan frame PNG asli */
    .strip-real {
      position:relative;
      width:clamp(96px, 16vh, 170px);
      aspect-ratio:1/3;
      border-radius:4px;
      overflow:hidden;
      box-shadow:0 16px 48px #00000050;
      transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
      background:#dcdddd;
    }
    .strip-real:hover { transform:scale(1.01); }

    /* Photo slots posisi absolut sesuai koordinat frame */
    .strip-real-slot {
      position:absolute;
      left:1.667%; width:96.667%;
      overflow:hidden;
      background:#c7c9ca;
    }
    .strip-real-slot:nth-child(1) { top:5.556%;  height:29.667%; }
    .strip-real-slot:nth-child(2) { top:35.667%; height:29.667%; }
    .strip-real-slot:nth-child(3) { top:65.778%; height:29.667%; }
    .strip-real-slot img { width:100%; height:100%; object-fit:cover; display:block; }

    .strip-slot-empty { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; }
    .strip-slot-empty-num { font-size:8px; letter-spacing:0.1em; text-transform:uppercase; color:#9b9d9c70; }

    .strip-slot-label {
      position:absolute; bottom:3px; right:3px;
      background:#00000060; color:#fff; font-size:8px;
      padding:1px 5px; border-radius:100px;
    }

    /* Frame PNG overlay */
    .strip-real-overlay {
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:fill; pointer-events:none; z-index:5;
      opacity:0.92;
      filter:brightness(1.45) saturate(0.72) contrast(0.9);
      display:none;
    }

    .reorder-hint {
      padding:10px 16px;
      border-top:1px solid var(--border);
      font-size:12px;
      color:var(--text-muted);
      text-align:center;
      line-height:1.5;
      flex-shrink:0;
      background:linear-gradient(to bottom, transparent, #01395e03);
    }

    /* Preview Filter */
    .strip-filter-wrap {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .strip-filter-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .strip-filter-select {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--cream);
      outline: none;
      transition: var(--transition);
    }
    .strip-filter-select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px var(--gold-dim);
    }

    /* Timer */
    .select-timer-bar { padding:10px 16px; border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .select-timer-dot { width:5px; height:5px; border-radius:50%; background:var(--gold); flex-shrink:0; animation:pulse 1.5s infinite; }
    .select-timer-dot.warning { background:var(--blush); }
    .select-timer-label { font-size:11px; color:var(--text-muted); flex:1; }
    .select-timer-display { font-family:var(--font-display); font-size:20px; font-weight:400; color:var(--cream); letter-spacing:-0.01em; }
    .select-timer-display.warning { color:var(--blush); }

    /* Action Bar */
    .action-bar { padding:12px 16px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:8px; flex-shrink:0; background:var(--bg-card); }
    .action-bar-row { display:flex; align-items:center; justify-content:space-between; }
    .action-bar-label { font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); }
    .action-bar-count { font-family:var(--font-display); font-size:16px; color:var(--cream); }

    .btn-compose {
      width:100%; padding:15px; background:var(--gold); color:var(--on-accent);
      border:none; border-radius:var(--radius-md); font-family:var(--font-body);
      font-size:13px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;
      cursor:pointer; transition:var(--transition);
      display:flex; align-items:center; justify-content:center; gap:10px;
    }
    .btn-compose:hover:not(:disabled) { background:var(--gold-light); transform:translateY(-1px); box-shadow:0 8px 24px #01395e30; }
    .btn-compose:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

    @keyframes animUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .animate-in { opacity:0; animation:animUp 0.5s ease forwards; }

    @media (max-width: 1024px) {
      .select-main {
        grid-template-columns: minmax(0, 1fr) 280px;
      }

      .photo-grid-scroll {
        padding: 14px 16px;
      }

      .photo-grid-header {
        padding: 16px;
      }

      .strip-real {
        width: clamp(92px, 15vh, 140px);
      }
    }

    @media (max-width: 860px) {
      .select-wrap {
        min-height: 100vh;
        min-height: 100dvh;
        height: auto;
        overflow: auto;
      }

      .select-main {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        overflow: visible;
      }

      .strip-panel {
        border-bottom: 1px solid var(--border);
        overflow: visible;
      }

      .photo-grid-panel {
        border-right: none;
      }

      .strip-preview-area {
        padding: 14px;
      }

      .strip-real {
        width: clamp(98px, 21vw, 130px);
      }

      .photo-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      }
    }

    @media (max-width: 520px) {
      .photo-grid-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .photo-grid-header-right {
        width: 100%;
        align-items: flex-start;
      }

      .photo-grid-scroll,
      .strip-panel-header,
      .strip-filter-wrap,
      .select-timer-bar,
      .action-bar {
        padding-left: 12px;
        padding-right: 12px;
      }

      .strip-preview-area {
        min-height: 190px;
      }

      .photo-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .slot-dot {
        width: 18px;
      }
    }

    @media (min-width: 1600px) {
      .select-main {
        grid-template-columns: 1fr 420px;
      }

      .strip-real {
        width: clamp(110px, 17vh, 190px);
      }

      .photo-grid {
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      }
    }

    @media (max-height: 760px) {
      .photo-grid-header,
      .strip-panel-header,
      .strip-filter-wrap,
      .select-timer-bar,
      .action-bar {
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .strip-preview-area {
        min-height: 170px;
        padding: 8px;
      }

      .strip-real {
        width: clamp(88px, 14vh, 112px);
      }

      .slot-counter {
        font-size: 30px;
      }
    }

    @media (orientation: landscape) and (max-height: 520px) {
      .select-main {
        grid-template-columns: 1fr 240px;
      }

      .strip-panel {
        border-bottom: none;
        border-left: 1px solid var(--border);
      }

      .strip-real {
        width: clamp(80px, 11vh, 96px);
      }

      .reorder-hint {
        font-size: 11px;
        padding: 8px;
      }

      .strip-filter-wrap {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="select-wrap">
    <nav class="nav">
      <a href="frame.html" class="nav-logo">Jonas Photo</a>
      <div class="nav-steps">
        <div class="nav-step done"></div>
        <div class="nav-step done"></div>
        <div class="nav-step done"></div>
        <div class="nav-step done"></div>
        <div class="nav-step active"></div>
        <div class="nav-step"></div>
      </div>
      <span class="label">Langkah 5 / 6</span>
    </nav>

    <div class="select-main">

      <!-- Left: Photo Grid -->
      <div class="photo-grid-panel">
        <div class="photo-grid-header">
          <div class="photo-grid-header-left">
            <p>Step 05</p>
            <h2>Pilih 3 foto<br/>untuk strip</h2>
          </div>
          <div class="photo-grid-header-right">
            <div class="slot-counter"><span id="selectedCount">0</span>/3</div>
            <div class="slot-counter-label">foto dipilih</div>
            <div class="slot-indicators">
              <div class="slot-dot" id="dot1"></div>
              <div class="slot-dot" id="dot2"></div>
              <div class="slot-dot" id="dot3"></div>
            </div>
          </div>
        </div>
        <div class="photo-grid-scroll">
          <div class="photo-grid" id="photoGrid">
            <div class="photo-loading">
              <div class="spinner" style="border-top-color:var(--gold)"></div>
              Memuat foto...
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Strip Preview dengan frame PNG asli -->
      <div class="strip-panel">
        <div class="strip-panel-header">
          <p>Preview</p>
          <h3 id="frameName">Strip Foto</h3>
        </div>

        <div class="strip-preview-area">
          <div class="strip-real" id="stripReal">
            <!-- Slot foto -->
            <div class="strip-real-slot" id="slot1">
              <div class="strip-slot-empty">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                  <rect x="2" y="4" width="16" height="12" rx="2" stroke="#9b9d9c50" stroke-width="1.5"/>
                  <circle cx="10" cy="10" r="2.5" stroke="#9b9d9c50" stroke-width="1.5"/>
                </svg>
                <span class="strip-slot-empty-num">slot 1</span>
              </div>
            </div>
            <div class="strip-real-slot" id="slot2">
              <div class="strip-slot-empty">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                  <rect x="2" y="4" width="16" height="12" rx="2" stroke="#9b9d9c50" stroke-width="1.5"/>
                  <circle cx="10" cy="10" r="2.5" stroke="#9b9d9c50" stroke-width="1.5"/>
                </svg>
                <span class="strip-slot-empty-num">slot 2</span>
              </div>
            </div>
            <div class="strip-real-slot" id="slot3">
              <div class="strip-slot-empty">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                  <rect x="2" y="4" width="16" height="12" rx="2" stroke="#9b9d9c50" stroke-width="1.5"/>
                  <circle cx="10" cy="10" r="2.5" stroke="#9b9d9c50" stroke-width="1.5"/>
                </svg>
                <span class="strip-slot-empty-num">slot 3</span>
              </div>
            </div>

            <!-- Frame PNG overlay -->
            <img class="strip-real-overlay" id="frameOverlay" alt="frame" />
          </div>
        </div>

        <div class="reorder-hint">
          Klik foto untuk memilih urutan.<br/>
          Urutan klik = posisi di strip (1, 2, 3)
        </div>

        <div class="strip-filter-wrap">
          <span class="strip-filter-label">Filter Preview Strip</span>
          <select id="stripFilterSelect" class="strip-filter-select" onchange="changeStripFilter(this.value)">
            <option value="none">Natural (Tanpa Filter)</option>
            <option value="warm">Warm</option>
            <option value="cool">Cool</option>
            <option value="mono">Mono</option>
            <option value="vivid">Vivid</option>
            <option value="soft">Soft</option>
            <option value="sepia">Sepia</option>
            <option value="film">Film Fade</option>
            <option value="dramatic">Dramatic</option>
            <option value="pastel">Pastel</option>
            <option value="retro">Retro Pop</option>
          </select>
        </div>

        <!-- Timer -->
        <div class="select-timer-bar">
          <div class="select-timer-dot" id="selectTimerDot"></div>
          <span class="select-timer-label">Waktu pilih foto</span>
          <span class="select-timer-display" id="selectTimerDisplay">01:30</span>
        </div>

        <!-- Action Bar -->
        <div class="action-bar">
          <div class="action-bar-row">
            <span class="action-bar-label">Foto terpilih</span>
            <span class="action-bar-count"><span id="actionCount">0</span> / 3</span>
          </div>
          <button class="btn-compose" id="composeBtn" onclick="composeAndNext()" disabled>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5 8h6M8 5v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Buat Strip Foto
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/session.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/select-page.js"></script>
</body>
</html>
