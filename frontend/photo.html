<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sesi Foto — Jonas Photo</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .photo-wrap {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .photo-main {
      flex: 1; display: grid;
      grid-template-columns: 1fr 360px; overflow: hidden;
    }
    .camera-panel {
      position: relative; background: #000;
      display: flex; align-items: center;
      justify-content: center; overflow: hidden;
    }
    #videoEl {
      width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1);
    }
    .camera-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: transparent; pointer-events: none; z-index: 10;
    }
    .countdown-number {
      font-family: var(--font-display);
      font-size: 200px; font-weight: 300;
      color: #fff; opacity: 0; line-height: 1;
      text-shadow: 0 0 80px #00000080; transition: none;
    }
    .countdown-number.show {
      animation: countPop 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes countPop {
      0%   { opacity: 0; transform: scale(1.5); }
      20%  { opacity: 1; transform: scale(1); }
      80%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.8); }
    }
    .camera-flash {
      position: absolute; inset: 0;
      background: #fff; opacity: 0;
      pointer-events: none; z-index: 20;
    }
    .camera-flash.flash { animation: flashAnim 0.4s ease forwards; }
    @keyframes flashAnim {
      0%   { opacity: 0.9; }
      100% { opacity: 0; }
    }
    .camera-guide {
      position: absolute; width: 40px; height: 40px; z-index: 5; opacity: 0.5;
    }
    .camera-guide--tl { top: 24px; left: 24px; border-top: 2px solid #fff; border-left: 2px solid #fff; }
    .camera-guide--tr { top: 24px; right: 24px; border-top: 2px solid #fff; border-right: 2px solid #fff; }
    .camera-guide--bl { bottom: 24px; left: 24px; border-bottom: 2px solid #fff; border-left: 2px solid #fff; }
    .camera-guide--br { bottom: 24px; right: 24px; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }
    .session-timer-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px; background: var(--border); z-index: 10;
    }
    .session-timer-fill {
      height: 100%; background: var(--gold);
      transition: width 1s linear; width: 100%;
    }
    .session-timer-fill.warning { background: var(--blush); }
    .session-time-display {
      position: absolute; top: 16px; left: 50%;
      transform: translateX(-50%);
      background: #00000088; backdrop-filter: blur(10px);
      border: 1px solid #ffffff20; border-radius: 100px;
      padding: 6px 18px; font-size: 13px;
      font-weight: 500; color: #fff; z-index: 10;
      letter-spacing: 0.05em;
    }
    .session-time-display.warning {
      color: var(--blush); border-color: #8a96ae40;
    }
    .camera-placeholder {
      display: none; flex-direction: column;
      align-items: center; gap: 16px;
      text-align: center; padding: 40px;
    }
    .camera-placeholder svg { opacity: 0.3; }
    .camera-placeholder p { font-size: 14px; color: var(--text-secondary); }
    .photo-sidebar {
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden; background: var(--bg-card);
    }
    .sidebar-top {
      padding: 24px; border-bottom: 1px solid var(--border);
    }
    .sidebar-top-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 6px;
    }
    .sidebar-top-title {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 400; color: var(--cream);
    }
    .photo-count-row {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }
    .photo-count-label { font-size: 12px; color: var(--text-secondary); }
    .photo-count-value {
      font-family: var(--font-display);
      font-size: 20px; color: var(--gold);
    }
    .thumbnails-wrap {
      flex: 1; overflow-y: auto; padding: 16px;
    }
    .thumbnails-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .thumb-item {
      aspect-ratio: 4/3; border-radius: var(--radius-sm);
      overflow: hidden; position: relative;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      animation: thumbIn 0.4s ease;
    }
    @keyframes thumbIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-number {
      position: absolute; bottom: 6px; right: 6px;
      background: #00000088; color: #fff;
      font-size: 10px; padding: 2px 7px;
      border-radius: 100px; letter-spacing: 0.04em;
    }
    .capture-area {
      padding: 20px 24px; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 12px;
    }
    .btn-capture {
      width: 100%; height: 56px;
      background: var(--gold); color: var(--on-accent);
      border: none; border-radius: var(--radius-md);
      font-family: var(--font-body); font-size: 13px;
      font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer;
      transition: var(--transition);
      display: flex; align-items: center;
      justify-content: center; gap: 10px;
    }
    .btn-capture:hover:not(:disabled) {
      background: var(--gold-light); transform: translateY(-1px);
      box-shadow: 0 8px 24px #01395e30;
    }
    .btn-capture:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-capture.counting {
      background: var(--bg-elevated); color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .countdown-select-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .countdown-select-label { font-size: 12px; color: var(--text-secondary); }
    .countdown-btns { display: flex; gap: 6px; }
    .countdown-opt {
      width: 36px; height: 28px; border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elevated); color: var(--text-secondary);
      font-size: 12px; font-family: var(--font-body);
      cursor: pointer; transition: var(--transition);
    }
    .countdown-opt.active {
      border-color: var(--gold);
      background: var(--gold-dim); color: var(--gold);
    }
    .btn-done {
      width: 100%; padding: 14px; background: transparent;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md); color: var(--cream);
      font-family: var(--font-body); font-size: 13px;
      font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase; cursor: pointer;
      transition: var(--transition); display: none;
    }
    .btn-done:hover {
      border-color: var(--gold); color: var(--gold);
      background: var(--gold-dim);
    }
    .btn-done.visible { display: block; }
    .session-ended {
      display: none; position: absolute; inset: 0;
      background: #00000088; backdrop-filter: blur(8px);
      z-index: 30; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; text-align: center; padding: 40px;
    }
    .session-ended.show { display: flex; }
    .session-ended h3 {
      font-family: var(--font-display);
      font-size: 36px; font-weight: 300; color: var(--cream);
    }
    .session-ended p { font-size: 14px; color: var(--text-secondary); }

    @media (max-width: 980px) {
      .photo-main {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(320px, 54vh) 1fr;
      }

      .photo-sidebar {
        border-left: none;
        border-top: 1px solid var(--border);
      }

      .thumbnails-wrap {
        max-height: 210px;
      }
    }

    @media (max-width: 680px) {
      .countdown-number {
        font-size: 120px;
      }

      .sidebar-top,
      .photo-count-row,
      .capture-area {
        padding-left: 14px;
        padding-right: 14px;
      }

      .thumbnails-wrap {
        padding: 12px;
      }

      .thumbnails-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .camera-guide {
        width: 28px;
        height: 28px;
      }

      .camera-guide--tl,
      .camera-guide--tr {
        top: 12px;
      }

      .camera-guide--bl,
      .camera-guide--br {
        bottom: 12px;
      }

      .camera-guide--tl,
      .camera-guide--bl {
        left: 12px;
      }

      .camera-guide--tr,
      .camera-guide--br {
        right: 12px;
      }
    }

    @media (max-width: 460px) {
      .photo-main {
        grid-template-rows: minmax(240px, 45vh) 1fr;
      }

      .session-time-display {
        top: 10px;
        padding: 5px 12px;
      }

      .countdown-btns {
        flex-wrap: wrap;
        justify-content: flex-end;
      }
    }

    @media (min-width: 1600px) {
      .photo-main {
        grid-template-columns: 1fr 420px;
      }

      .thumbnails-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-height: 760px) {
      .sidebar-top,
      .photo-count-row,
      .capture-area {
        padding-top: 12px;
        padding-bottom: 12px;
      }

      .btn-capture {
        height: 48px;
      }

      .session-time-display {
        top: 10px;
      }
    }

    @media (orientation: landscape) and (max-height: 520px) {
      .photo-main {
        grid-template-columns: 1fr 290px;
      }

      .photo-sidebar {
        border-top: none;
        border-left: 1px solid var(--border);
      }

      .thumbnails-wrap {
        max-height: none;
      }

      .countdown-number {
        font-size: 96px;
      }
    }
  </style>
</head>
<body>
  <div class="photo-wrap">
    <nav class="nav">
      <span class="nav-logo">Jonas Photo</span>
      <div class="nav-steps">
        <div class="nav-step done"></div>
        <div class="nav-step done"></div>
        <div class="nav-step active"></div>
        <div class="nav-step"></div>
        <div class="nav-step"></div>
        <div class="nav-step"></div>
      </div>
      <span class="label">Langkah 3 / 6</span>
    </nav>

    <div class="photo-main">
      <div class="camera-panel">
        <div class="session-timer-bar">
          <div class="session-timer-fill" id="timerFill"></div>
        </div>
        <div class="session-time-display" id="sessionTimeDisplay">00:00</div>
        <div class="camera-guide camera-guide--tl"></div>
        <div class="camera-guide camera-guide--tr"></div>
        <div class="camera-guide camera-guide--bl"></div>
        <div class="camera-guide camera-guide--br"></div>
        <video id="videoEl" autoplay playsinline muted></video>
        <div class="camera-placeholder" id="cameraPlaceholder">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <rect x="8" y="18" width="48" height="36" rx="4" stroke="var(--text-muted)" stroke-width="2"/>
            <circle cx="32" cy="36" r="10" stroke="var(--text-muted)" stroke-width="2"/>
            <circle cx="32" cy="36" r="4" fill="var(--text-muted)"/>
            <path d="M24 18l4-6h8l4 6" stroke="var(--text-muted)" stroke-width="2" stroke-linejoin="round"/>
          </svg>
          <p>Kamera tidak terdeteksi.<br/>Pastikan izin kamera sudah diberikan.</p>
          <button class="btn btn-secondary btn-sm" onclick="initCamera()">Coba Lagi</button>
        </div>
        <div class="camera-overlay">
          <div class="countdown-number" id="countdownNum"></div>
        </div>
        <div class="camera-flash" id="cameraFlash"></div>
        <div class="session-ended" id="sessionEnded">
          <h3>Waktu Habis!</h3>
          <p>Sesi foto kamu telah selesai.<br/>Lanjutkan untuk memilih foto terbaikmu.</p>
          <button class="btn btn-primary" onclick="goToFrame()">Pilih Frame →</button>
        </div>
      </div>

      <div class="photo-sidebar">
        <div class="sidebar-top">
          <div class="sidebar-top-label">Sesi Aktif</div>
          <div class="sidebar-top-title" id="categoryLabel">—</div>
        </div>
        <div class="photo-count-row">
          <span class="photo-count-label">Foto diambil</span>
          <span class="photo-count-value" id="photoCount">0</span>
        </div>
        <div class="thumbnails-wrap">
          <div class="thumbnails-grid" id="thumbnailsGrid"></div>
          <div id="emptyThumb" style="padding:24px;text-align:center">
            <p style="font-size:13px;color:var(--text-muted)">Foto akan muncul di sini</p>
          </div>
        </div>
        <div class="capture-area">
          <div class="countdown-select-row">
            <span class="countdown-select-label">Hitung mundur</span>
            <div class="countdown-btns">
              <button class="countdown-opt" onclick="setCountdown(3)">3s</button>
              <button class="countdown-opt active" onclick="setCountdown(5)">5s</button>
              <button class="countdown-opt" onclick="setCountdown(10)">10s</button>
            </div>
          </div>
          <button class="btn-capture" id="captureBtn" onclick="startCapture()">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="10" cy="10" r="4" fill="currentColor"/>
            </svg>
            Ambil Foto
          </button>
          <button class="btn-done" id="doneBtn" onclick="goToFrame()">
            Selesai & Pilih Frame →
          </button>
        </div>
      </div>
    </div>
  </div>

  <canvas id="captureCanvas" style="display:none"></canvas>

  <script src="assets/js/session.js"></script>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/photo-page.js"></script>
</body>
</html>
